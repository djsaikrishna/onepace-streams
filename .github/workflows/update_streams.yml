name: Update One Pace Streams

on:
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour
  workflow_dispatch: # Button for manual runs

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        run: python -u scr.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add stream/ tracker.json
          
          # We only commit and push if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-updated One Pace streams" && git pull --rebase origin main && git push)

      - name: Purge jsDelivr CDN
        run: |
          if [ -f stream/st_purge.txt ]; then
            echo "Purging updated files from CDN..."
            while IFS= read -r filename; do
              curl -s "https://purge.jsdelivr.net/gh/6ip/onepace-streams@main/stream/$filename"
              echo " - Purged $filename"
            done < stream/st_purge.txt
            
            # Clean up the file so it doesn't linger
            rm stream/st_purge.txt
          else
            echo "No files updated. Skipping CDN purge."
          fi